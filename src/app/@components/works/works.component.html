<div class="bg-canvas">
  <img src="./aboutbackground.png" class="bg-canvas" alt="background">
</div>

<main class="content">
  <header class="worksHeader">
    <h2 class="title">works</h2>
  </header>

  <section class="carousel-controls">
    <button type="button" (click)="decreasePage()" [disabled]="startIndex === 0">
      left
    </button>

    <button type="button" (click)="increasePage()" [disabled]="startIndex >= works.length - displayedCount">
      right
    </button>
  </section>

  <section class="cards-wrapper">
    <div class="cards-track" [style.transform]="transformOffset">

      @for (work of sortedWorks; track work.link) {
      <a [href]="work.link" target="_blank" rel="noopener noreferrer" class="work-carousel-item">

        <div class="card">
          <div class="card-image-wrap">
            <img [src]="work.image" class="card-img-top" [alt]="work.title">
          </div>

          <div class="card-body">
            <div class="card-content">
              <h5 class="card-title">{{ work.title }}</h5>
              <p class="card-text">{{ work.description }}</p>
            </div>

            <div class="card-meta">
              <span>{{ work.category }}</span>
              <span class="meta-separator">|</span>
              <span>{{ work.projectType }}</span>
            </div>
          </div>
        </div>
      </a>
      } @empty {
      <p class="empty-text">目前沒有作品。</p>
      }

    </div>
  </section>
</main>
