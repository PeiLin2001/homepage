<main class="content">

  <header class="writing-header">
    <h2 class="title">writings</h2>
  </header>

  <section class="writing-body" aria-label="文章列表">
    <ul class="writing-list">
      @for (article of articles; track article.id) {
        <li>
          <article class="writing-block-wrapper">
            <button
              class="writing-block"
              type="button"
              (click)="onSelectArticle(article)"
            >
              <div class="writing-left">
                <h3 class="article-title">{{ article.title }}</h3>
                <p class="article-preview">{{ article.preview || '...' }}</p>
              </div>
              <div class="writing-right">
                @if (article.date) {
                  <time class="writing-date" [attr.datetime]="article.date">
                    {{ formatDate(article.date) }}
                  </time>
                } @else {
                  <span class="writing-date">未發布</span>
                }
              </div>
            </button>
          </article>
        </li>
      }
    </ul>
  </section>

</main>
